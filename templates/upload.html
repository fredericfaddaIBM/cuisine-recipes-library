{% extends "base.html" %}

{% block title %}Upload Recipe - Recipe Library{% endblock %}

{% block content %}
<div class="upload-container">
    <h1>Upload Recipe Image</h1>
    <p>Upload an image of a recipe and let AI extract the details automatically</p>

    <div class="upload-area" id="uploadArea">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="drop-zone" id="dropZone">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag and drop an image here or click to browse</p>
                <input type="file" id="fileInput" name="file" accept="image/*,.heic,.heif" style="display: none;">
                <button type="button" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    Choose File
                </button>
            </div>
            <div id="preview" class="preview" style="display: none;">
                <img id="previewImage" src="" alt="Preview">
                <p id="fileName"></p>
            </div>
            <button type="submit" class="btn btn-success" id="uploadBtn" style="display: none;">
                Upload and Process
            </button>
        </form>
    </div>

    <div id="progress" class="progress-container" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="progressText">Processing...</p>
    </div>

    <div id="result" class="result-container" style="display: none;">
        <div class="alert" id="resultAlert"></div>
    </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const uploadForm = document.getElementById('uploadForm');
const preview = document.getElementById('preview');
const previewImage = document.getElementById('previewImage');
const fileName = document.getElementById('fileName');
const uploadBtn = document.getElementById('uploadBtn');
const progress = document.getElementById('progress');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const result = document.getElementById('result');
const resultAlert = document.getElementById('resultAlert');

// Drag and drop
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        handleFile(files[0]);
    }
});

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
    }
});

function handleFile(file) {
    fileName.textContent = file.name;
    
    // Show preview
    const reader = new FileReader();
    reader.onload = (e) => {
        previewImage.src = e.target.result;
        preview.style.display = 'block';
        uploadBtn.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const file = fileInput.files[0];
    if (!file) {
        alert('Please select a file');
        return;
    }
    
    // Show progress
    progress.style.display = 'block';
    result.style.display = 'none';
    uploadBtn.disabled = true;
    progressText.textContent = 'Uploading and processing...';
    
    const formData = new FormData();
    formData.append('file', file);
    
    try {
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            resultAlert.className = 'alert alert-success';
            resultAlert.innerHTML = `
                <h3>✅ Success!</h3>
                <p>${data.message}</p>
                <a href="/recipe/${data.recipe_id}" class="btn btn-primary">View Recipe</a>
            `;
        } else {
            resultAlert.className = 'alert alert-error';
            resultAlert.innerHTML = `
                <h3>❌ Error</h3>
                <p>${data.error}</p>
            `;
        }
    } catch (error) {
        resultAlert.className = 'alert alert-error';
        resultAlert.innerHTML = `
            <h3>❌ Error</h3>
            <p>Failed to upload: ${error.message}</p>
        `;
    } finally {
        progress.style.display = 'none';
        result.style.display = 'block';
        uploadBtn.disabled = false;
    }
});
</script>
{% endblock %}
