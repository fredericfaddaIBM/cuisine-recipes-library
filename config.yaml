# Recipe Converter Configuration

# Ollama Models
models:
  vision: "qwen2.5vl"  # or "llama3.2-vision" or "llava" for lighter weight
  # Embedding models (context length):
  # - nomic-embed-text: 8192 tokens (recommended, large context)
  # - mxbai-embed-large: 512 tokens (smaller context, may need truncation)
  # - all-minilm: 256 tokens (very small, fast)
  embedding: "nomic-embed-text"

# Directories
directories:
  images: "./images"
  recipes: "./recipes"
  embeddings: "./embeddings"
  templates: "./templates"

# Processing Options
processing:
  # Image quality threshold (0-100)
  quality_threshold: 70
  # Enable OCR preprocessing for low quality images
  use_ocr_fallback: false
  # Batch size for processing multiple images
  batch_size: 5
  # Generate embeddings during processing
  generate_embeddings: true

# Recipe Extraction
extraction:
  # Prompt temperature (0.0-1.0, lower = more consistent)
  temperature: 0.1
  # Maximum tokens for response (increased for long recipes)
  max_tokens: 8000
  # Retry failed extractions
  retry_on_failure: true
  max_retries: 2

# Search Options
search:
  # Number of results to return
  default_limit: 10
  # Minimum similarity score for semantic search (0.0-1.0)
  similarity_threshold: 0.6
  # Enable hybrid search by default
  hybrid_search: true

# Tagging
tags:
  # Auto-detect cuisine types
  auto_cuisine: true
  # Auto-detect dietary restrictions
  auto_dietary: true
  # Auto-detect meal types
  auto_meal_type: true
  # Auto-detect allergens
  auto_allergens: true

# Validation
validation:
  # Require minimum fields
  require_title: true
  require_ingredients: true
  require_instructions: true
  # Flag recipes for manual review if confidence is low
  manual_review_threshold: 0.7

# Made with Bob
